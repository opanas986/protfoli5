<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AchievO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0a0a12;--bg1:#12121e;--bg2:#1a1a2e;--bg3:#20203a;
  --acc:#a78bfa;--acc2:#7c3aed;--acc3:#c4b5fd;
  --gold:#fbbf24;--gold2:#f59e0b;
  --text1:#f1f0ff;--text2:#a39fc4;--text3:#6b6889;
  --success:#34d399;--danger:#f87171;
  --card:#16162a;--border:rgba(167,139,250,0.15);
  --shine:rgba(167,139,250,0.08);
  --glow:0 0 20px rgba(167,139,250,0.3);
  --r:14px;--r2:10px;--r3:8px;
}
[data-theme="light"]{
  --bg0:#f0eeff;--bg1:#f8f7ff;--bg2:#ffffff;--bg3:#ede8ff;
  --acc:#7c3aed;--acc2:#5b21b6;--acc3:#a78bfa;
  --gold:#d97706;--gold2:#b45309;
  --text1:#1e1b4b;--text2:#4c1d95;--text3:#7c3aed;
  --success:#059669;--danger:#dc2626;
  --card:#ffffff;--border:rgba(124,58,237,0.18);
  --shine:rgba(124,58,237,0.06);
  --glow:0 0 20px rgba(124,58,237,0.2);
}
html,body{
  background:var(--bg0);color:var(--text1);
  font-family:'Space Grotesk',sans-serif;
  cursor:none;min-height:100vh;
  transition:background 0.4s,color 0.4s;
}

/* CURSOR */
#cur{position:fixed;width:14px;height:14px;border-radius:50%;background:var(--acc);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:transform 0.08s}
#cur2{position:fixed;width:38px;height:38px;border-radius:50%;border:1.5px solid var(--acc);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:0.5;transition:left 0.12s,top 0.12s}
#cur3{position:fixed;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,0.15) 0%,transparent 70%);pointer-events:none;z-index:9997;transform:translate(-50%,-50%);transition:left 0.18s,top 0.18s}
.particle{position:fixed;pointer-events:none;z-index:9990;border-radius:50%;animation:pfly 0.9s ease-out forwards}
@keyframes pfly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

/* LAYOUT */
.app{max-width:760px;margin:0 auto;padding:2rem 1.25rem 5rem}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:10px;flex-wrap:wrap}
.logo{font-size:22px;font-weight:700;background:linear-gradient(90deg,var(--acc),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:none;transition:all 0.2s;font-weight:500}
.pill-btn:hover{border-color:var(--acc);color:var(--acc);box-shadow:var(--glow);background:var(--shine)}
.pill-btn.active{border-color:var(--acc);color:var(--acc);background:var(--shine)}
.lang-wrap{display:flex;gap:4px}

/* HERO */
.hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden;transition:background 0.4s,border 0.4s}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,0.1) 0%,transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:1.25rem}
.lv-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.lv-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.ring-track{stroke:var(--bg3);stroke-width:4;fill:none}
.ring-fill{stroke:url(#ringGrad);stroke-width:4;fill:none;stroke-linecap:round;transition:stroke-dashoffset 0.5s cubic-bezier(.4,0,.2,1)}
.lv-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.lv-num{font-size:18px;font-weight:700;color:var(--acc3);line-height:1}
.lv-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.hero-info{flex:1}
.hero-title{font-size:18px;font-weight:700;color:var(--text1);margin-bottom:2px}
.hero-sub{font-size:13px;color:var(--text2)}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--bg2);border-radius:var(--r2);padding:10px 12px;border:1px solid var(--border);text-align:center;transition:background 0.3s}
.stat-v{font-size:22px;font-weight:700}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:0.5px}
.gold{color:var(--gold)}
.purple{color:var(--acc)}
.green{color:var(--success)}

/* CONTROLS */
.ctrls{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.ctrls input,.ctrls select{flex:1;min-width:120px;padding:9px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--card);color:var(--text1);font-size:13px;font-family:'Space Grotesk',sans-serif;cursor:none;transition:border 0.2s,box-shadow 0.2s;outline:none}
.ctrls input:focus,.ctrls select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(167,139,250,0.15)}
.ctrls select option{background:var(--bg1)}
.btn-add-lvl{display:flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--r2);background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;border:none;cursor:none;transition:opacity 0.2s,transform 0.15s,box-shadow 0.2s;white-space:nowrap;box-shadow:0 4px 15px rgba(124,58,237,0.4)}
.btn-add-lvl:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,58,237,0.55)}
.btn-add-lvl:active{transform:scale(0.97)}

/* ADD FORM */
.add-form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;display:none;animation:slideIn 0.25s ease-out}
.add-form.open{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.form-row input{flex:1;min-width:160px;padding:9px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:13px;font-family:'Space Grotesk',sans-serif;cursor:none;outline:none;transition:border 0.2s}
.form-row input:focus{border-color:var(--acc)}
.emoji-btn{font-size:24px;padding:7px 11px;border-radius:var(--r3);border:1px solid var(--border);background:var(--bg2);cursor:none;transition:border 0.2s}
.emoji-btn:hover{border-color:var(--acc)}
.color-row{display:flex;gap:7px;margin-top:12px;align-items:center;flex-wrap:wrap}
.clr{width:24px;height:24px;border-radius:50%;cursor:none;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s}
.clr:hover{transform:scale(1.2)}
.clr.sel{border-color:#fff;transform:scale(1.25)}
.form-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{padding:8px 22px;border-radius:var(--r3);background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;border:none;cursor:none;transition:opacity 0.2s}
.btn-save:hover{opacity:0.85}
.btn-cancel{padding:8px 16px;border-radius:var(--r3);background:transparent;color:var(--text2);border:1px solid var(--border);font-size:13px;font-family:'Space Grotesk',sans-serif;cursor:none;transition:color 0.2s,border-color 0.2s}
.btn-cancel:hover{color:var(--text1);border-color:var(--text3)}

/* LEVELS */
.levels{display:flex;flex-direction:column;gap:12px}
.level-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;animation:fadeUp 0.3s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.level-card:hover{border-color:var(--acc);box-shadow:0 0 30px rgba(167,139,250,0.1)}
.level-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:none;user-select:none;transition:background 0.2s}
.level-head:hover{background:var(--shine)}
.lv-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:transform 0.2s}
.level-card:hover .lv-icon{transform:scale(1.1) rotate(-3deg)}
.lv-name{flex:1;font-size:15px;font-weight:600;color:var(--text1)}
.lv-prog-wrap{display:flex;align-items:center;gap:8px}
.lv-pct{font-size:12px;color:var(--text3);min-width:28px;text-align:right}
.mini-bar{width:70px;height:5px;background:var(--bg3);border-radius:99px;overflow:hidden}
.mini-fill{height:100%;border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.lv-del{padding:5px 7px;border-radius:6px;background:transparent;border:none;color:var(--text3);cursor:none;opacity:0;transition:opacity 0.2s,color 0.2s,background 0.2s;font-size:14px}
.level-head:hover .lv-del{opacity:1}
.lv-del:hover{color:var(--danger);background:rgba(248,113,113,0.12)}
.chevron-icon{font-size:16px;color:var(--text3);transition:transform 0.25s}
.level-card.collapsed .chevron-icon{transform:rotate(-90deg)}

/* TASKS */
.tasks-body{border-top:1px solid var(--border)}
.tasks-inner{padding:8px}
.task-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r3);cursor:none;transition:background 0.15s;position:relative}
.task-row:hover{background:var(--shine)}
.chk{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;cursor:none}
.chk.done{background:linear-gradient(135deg,var(--acc2),var(--acc));border-color:transparent}
.chk.done::after{content:'✓';font-size:13px;color:#fff;font-weight:700}
.t-name{flex:1;font-size:14px;color:var(--text1);transition:color 0.2s}
.t-name.done{text-decoration:line-through;color:var(--text3)}
.t-xp{font-size:11px;font-weight:700;color:var(--gold2);background:rgba(251,191,36,0.12);padding:3px 8px;border-radius:99px;flex-shrink:0}
.t-del{padding:4px 7px;border-radius:6px;background:transparent;border:none;color:var(--text3);cursor:none;opacity:0;transition:opacity 0.15s,color 0.15s;font-size:14px}
.task-row:hover .t-del{opacity:1}
.t-del:hover{color:var(--danger)}
.add-task-row{display:flex;gap:8px;padding:8px 10px 12px}
.add-task-row input[type="text"]{flex:1;padding:7px 12px;border-radius:var(--r3);border:1px solid var(--border);background:var(--bg2);color:var(--text1);font-size:13px;font-family:'Space Grotesk',sans-serif;cursor:none;outline:none;transition:border 0.2s}
.add-task-row input[type="text"]:focus{border-color:var(--acc)}
.add-task-row input[type="text"]::placeholder{color:var(--text3)}
.xp-mini{width:62px;padding:7px 8px;border-radius:var(--r3);border:1px solid var(--border);background:var(--bg2);color:var(--gold);font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:none;outline:none;text-align:center;transition:border 0.2s}
.xp-mini:focus{border-color:var(--gold)}
.btn-plus{width:34px;height:34px;border-radius:var(--r3);background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:none;transition:all 0.2s;flex-shrink:0}
.btn-plus:hover{border-color:var(--acc);color:var(--acc);background:var(--shine)}
.empty-state{text-align:center;padding:2.5rem;color:var(--text3);font-size:14px}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;padding:10px 24px;border-radius:99px;opacity:0;transition:all 0.4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:9995;white-space:nowrap;box-shadow:0 8px 30px rgba(124,58,237,0.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* XP POP & BURST */
.xp-pop{position:fixed;pointer-events:none;z-index:9991;font-size:14px;font-weight:700;color:var(--gold);font-family:'Space Grotesk',sans-serif;animation:xpRise 0.9s ease-out forwards;text-shadow:0 0 10px rgba(251,191,36,0.5)}
@keyframes xpRise{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.2)}}
.done-burst{position:fixed;pointer-events:none;z-index:9988;width:6px;height:6px;border-radius:50%;animation:burst 0.7s ease-out forwards}
@keyframes burst{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:translate(var(--bx),var(--by)) scale(0)}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--acc)}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur2"></div>
<div id="cur3"></div>
<div id="toast"></div>

<svg width="0" height="0" style="position:absolute">
<defs>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#fbbf24"/>
  </linearGradient>
</defs>
</svg>

<div class="app">
  <div class="topbar">
    <div class="logo">⚔️ AchievO</div>
    <div class="topbar-right">
      <div class="lang-wrap" id="langWrap"></div>
      <button class="pill-btn" id="themeBtn"><span id="themeIco">☀️</span> <span id="themeTxt">Light</span></button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-top">
      <div class="lv-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle class="ring-track" cx="32" cy="32" r="28"/>
          <circle class="ring-fill" cx="32" cy="32" r="28" id="ringFill" stroke-dasharray="175.9" stroke-dashoffset="175.9"/>
        </svg>
        <div class="lv-inner">
          <span class="lv-num" id="lvNum">1</span>
          <span class="lv-lbl">LVL</span>
        </div>
      </div>
      <div class="hero-info">
        <div class="hero-title" id="heroTitle">Починаєш шлях...</div>
        <div class="hero-sub" id="heroSub">0 XP — продовжуй, герою!</div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-v gold" id="s1">0</div><div class="stat-l" id="sl1">Всього XP</div></div>
      <div class="stat"><div class="stat-v purple" id="s2">0</div><div class="stat-l" id="sl2">Виконано</div></div>
      <div class="stat"><div class="stat-v green" id="s3">0%</div><div class="stat-l" id="sl3">Прогрес</div></div>
    </div>
  </div>

  <div class="ctrls">
    <button class="btn-add-lvl" id="btnNew">+ <span id="t_newlv">Новий рівень</span></button>
    <input type="text" id="search" placeholder="Пошук завдань...">
    <select id="flt">
      <option value="all">Всі завдання</option>
      <option value="done">Виконані</option>
      <option value="todo">Невиконані</option>
    </select>
  </div>

  <div class="add-form" id="addForm">
    <div class="form-row">
      <button class="emoji-btn" id="emojiBtnF">🎯</button>
      <input type="text" id="lvlNameIn" placeholder="Назва рівня...">
    </div>
    <div class="color-row" id="colorRow"></div>
    <div class="form-actions">
      <button class="btn-save" id="btnSave">Зберегти</button>
      <button class="btn-cancel" id="btnCancel">Скасувати</button>
    </div>
  </div>

  <div class="levels" id="levelsWrap"></div>
</div>

<script>
const LANGS={
  UA:{
    newlv:'Новий рівень',
    titles:['Починаєш шлях...','Юний герой','Воїн','Майстер','Легенда','Напівбог','Безсмертний'],
    sub:'XP — продовжуй, герою!',s1:'Всього XP',s2:'Виконано',s3:'Прогрес',
    search:'Пошук завдань...',lvlname:'Назва рівня...',
    all:'Всі завдання',done_f:'Виконані',todo:'Невиконані',
    save:'Зберегти',cancel:'Скасувати',addtask:'Нове завдання...',
    lightTxt:'Світла',darkTxt:'Темна',
    toast_lv:'Рівень додано! 🎉',toast_task:'Завдання додано!',
    empty:'Завдань не знайдено',empty_global:'Додай перший рівень та завдання!',
    confirm_del:'Видалити рівень',del_lv:'Видалити',xp:'XP'
  },
  EN:{
    newlv:'New level',
    titles:['Just starting...','Young hero','Warrior','Master','Legend','Demigod','Immortal'],
    sub:'XP — keep going!',s1:'Total XP',s2:'Completed',s3:'Progress',
    search:'Search tasks...',lvlname:'Level name...',
    all:'All tasks',done_f:'Completed',todo:'Pending',
    save:'Save',cancel:'Cancel',addtask:'New task...',
    lightTxt:'Light',darkTxt:'Dark',
    toast_lv:'Level added! 🎉',toast_task:'Task added!',
    empty:'No tasks found',empty_global:'Add your first level and tasks!',
    confirm_del:'Delete level',del_lv:'Delete',xp:'XP'
  },
  PL:{
    newlv:'Nowy poziom',
    titles:['Zaczynasz...','Młody bohater','Wojownik','Mistrz','Legenda','Półbóg','Nieśmiertelny'],
    sub:'XP — walcz dalej!',s1:'Suma XP',s2:'Ukończone',s3:'Postęp',
    search:'Szukaj zadań...',lvlname:'Nazwa poziomu...',
    all:'Wszystkie',done_f:'Ukończone',todo:'Do zrobienia',
    save:'Zapisz',cancel:'Anuluj',addtask:'Nowe zadanie...',
    lightTxt:'Jasny',darkTxt:'Ciemny',
    toast_lv:'Poziom dodany! 🎉',toast_task:'Zadanie dodane!',
    empty:'Brak zadań',empty_global:'Dodaj pierwszy poziom i zadania!',
    confirm_del:'Usuń poziom',del_lv:'Usuń',xp:'XP'
  }
};

const PALETTES=[
  {bg:'rgba(167,139,250,0.15)',fill:'#a78bfa'},
  {bg:'rgba(251,191,36,0.15)',fill:'#fbbf24'},
  {bg:'rgba(52,211,153,0.15)',fill:'#34d399'},
  {bg:'rgba(248,113,113,0.15)',fill:'#f87171'},
  {bg:'rgba(56,189,248,0.15)',fill:'#38bdf8'},
  {bg:'rgba(251,146,60,0.15)',fill:'#fb923c'},
];

const EMOJIS=['🎯','⚔️','🧠','💪','📚','🎸','🏃','🎨','🔥','💻','🌟','🎮','💡','🏋️','🎤','🚀','🦁','🐉','🌈','🎪'];

let emojiIdx=0, curColor=0, lang='UA', theme='dark';

let data=null;
try{ data=JSON.parse(localStorage.getItem('achievo_v3')); }catch(e){}
if(!data){
  data={levels:[
    {name:{UA:'Фізична форма',EN:'Fitness',PL:'Forma fizyczna'},emoji:'💪',ci:2,collapsed:false,tasks:[
      {name:{UA:'50 віджимань',EN:'50 push-ups',PL:'50 pompek'},xp:20,done:false},
      {name:{UA:'Пробігти 5 км',EN:'Run 5 km',PL:'Przebiec 5 km'},xp:30,done:false},
      {name:{UA:'Медитація 10 хвилин',EN:'Meditate 10 min',PL:'Medytacja 10 min'},xp:15,done:true},
    ]},
    {name:{UA:'Навчання',EN:'Learning',PL:'Nauka'},emoji:'📚',ci:0,collapsed:false,tasks:[
      {name:{UA:'Прочитати 20 сторінок',EN:'Read 20 pages',PL:'Przeczytaj 20 stron'},xp:15,done:true},
      {name:{UA:'Урок програмування',EN:'Coding lesson',PL:'Lekcja kodowania'},xp:25,done:false},
    ]},
  ]};
}

const save=()=>{ try{ localStorage.setItem('achievo_v3',JSON.stringify(data)); }catch(e){} };

/* --- CURSOR --- */
const curEl=document.getElementById('cur');
const cur2El=document.getElementById('cur2');
const cur3El=document.getElementById('cur3');
let mx=0,my=0,lx=0,ly=0,pTick=0;

document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  curEl.style.left=mx+'px'; curEl.style.top=my+'px';
  cur3El.style.left=mx+'px'; cur3El.style.top=my+'px';
  pTick++;
  if(pTick%3===0) spawnParticle(mx,my);
});

function spawnParticle(x,y){
  const p=document.createElement('div');
  p.className='particle';
  const sz=Math.random()*4+2;
  const col=Math.random()>0.5?'var(--acc)':'var(--gold)';
  p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${col};--dx:${(Math.random()-0.5)*28}px;--dy:${(Math.random()-0.5)*28}px;`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),900);
}

(function loop(){
  lx+=(mx-lx)*0.12; ly+=(my-ly)*0.12;
  cur2El.style.left=lx+'px'; cur2El.style.top=ly+'px';
  requestAnimationFrame(loop);
})();

document.addEventListener('mousedown',()=>{
  curEl.style.transform='translate(-50%,-50%) scale(0.7)';
  cur2El.style.transform='translate(-50%,-50%) scale(1.4)';
});
document.addEventListener('mouseup',()=>{
  curEl.style.transform='translate(-50%,-50%) scale(1)';
  cur2El.style.transform='translate(-50%,-50%) scale(1)';
});

/* --- XP LOGIC --- */
function totalXP(){ let t=0; data.levels.forEach(lv=>lv.tasks.forEach(tk=>{ if(tk.done) t+=tk.xp; })); return t; }
function totalDone(){ let t=0; data.levels.forEach(lv=>lv.tasks.forEach(tk=>{ if(tk.done) t++; })); return t; }
function totalTasks(){ let t=0; data.levels.forEach(lv=>t+=lv.tasks.length); return t; }
function lvThresh(n){ return n<=1?0:Math.floor(100*Math.pow(1.5,n-2)); }
function playerLv(xp){ let lv=1; while(xp>=lvThresh(lv+1)&&lv<99) lv++; return lv; }
function L(){ return LANGS[lang]; }
function tName(t){ return typeof t.name==='object'?(t.name[lang]||t.name.UA||Object.values(t.name)[0]):t.name; }
function lvName(lv){ return typeof lv.name==='object'?(lv.name[lang]||lv.name.UA||Object.values(lv.name)[0]):lv.name; }

/* --- TOAST --- */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.classList.remove('show'),2500);
}

function xpPop(x,y,xp){
  const el=document.createElement('div');
  el.className='xp-pop'; el.textContent='+'+xp+' XP';
  el.style.left=x+'px'; el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

function burstEffect(x,y){
  for(let i=0;i<12;i++){
    const el=document.createElement('div');
    el.className='done-burst';
    const ang=Math.random()*Math.PI*2, dist=40+Math.random()*50;
    const col=Math.random()>0.5?'var(--acc)':'var(--gold)';
    el.style.cssText=`left:${x}px;top:${y}px;background:${col};--bx:${Math.cos(ang)*dist}px;--by:${Math.sin(ang)*dist}px;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }
}

/* --- UPDATE HERO --- */
function updateHero(){
  const xp=totalXP(), lv=playerLv(xp), l=L();
  const curThresh=lvThresh(lv), nxtThresh=lvThresh(lv+1);
  const pct=lv>=99?100:Math.round((xp-curThresh)/(nxtThresh-curThresh)*100);
  document.getElementById('ringFill').style.strokeDashoffset=175.9*(1-pct/100);
  document.getElementById('lvNum').textContent=lv;
  const titles=l.titles;
  document.getElementById('heroTitle').textContent=titles[Math.min(lv-1,titles.length-1)];
  document.getElementById('heroSub').textContent=xp+' '+l.xp+' — '+l.sub;
  document.getElementById('s1').textContent=xp;
  document.getElementById('s2').textContent=totalDone();
  const tot=totalTasks();
  document.getElementById('s3').textContent=tot?Math.round(totalDone()/tot*100)+'%':'0%';
  document.getElementById('sl1').textContent=l.s1;
  document.getElementById('sl2').textContent=l.s2;
  document.getElementById('sl3').textContent=l.s3;
}

/* --- RENDER --- */
function render(){
  const l=L();
  document.getElementById('t_newlv').textContent=l.newlv;
  document.getElementById('search').placeholder=l.search;
  document.getElementById('lvlNameIn').placeholder=l.lvlname;
  document.getElementById('btnSave').textContent=l.save;
  document.getElementById('btnCancel').textContent=l.cancel;
  const opts=document.querySelectorAll('#flt option');
  if(opts[0]) opts[0].textContent=l.all;
  if(opts[1]) opts[1].textContent=l.done_f;
  if(opts[2]) opts[2].textContent=l.todo;
  const themeIsLight=(theme==='light');
  document.getElementById('themeIco').textContent=themeIsLight?'🌙':'☀️';
  document.getElementById('themeTxt').textContent=themeIsLight?l.darkTxt:l.lightTxt;

  updateHero();

  const search=document.getElementById('search').value.toLowerCase();
  const flt=document.getElementById('flt').value;
  const wrap=document.getElementById('levelsWrap');
  wrap.innerHTML='';

  if(!data.levels.length){
    wrap.innerHTML='<div class="empty-state">'+l.empty_global+'</div>';
    return;
  }

  data.levels.forEach((lv,li)=>{
    const pal=PALETTES[lv.ci%PALETTES.length];
    const tasks=lv.tasks.filter(t=>{
      const ms=!search||tName(t).toLowerCase().includes(search);
      const mf=flt==='all'||(flt==='done'&&t.done)||(flt==='todo'&&!t.done);
      return ms&&mf;
    });
    const done=lv.tasks.filter(t=>t.done).length;
    const tot=lv.tasks.length;
    const pct=tot?Math.round(done/tot*100):0;

    const card=document.createElement('div');
    card.className='level-card'+(lv.collapsed?' collapsed':'');
    card.innerHTML=`
      <div class="level-head" data-li="${li}">
        <div class="lv-icon" style="background:${pal.bg}">${lv.emoji}</div>
        <div class="lv-name">${lvName(lv)}</div>
        <div class="lv-prog-wrap">
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:${pal.fill}"></div></div>
          <span class="lv-pct">${pct}%</span>
        </div>
        <button class="lv-del" data-dellv="${li}" title="${l.del_lv}">✕</button>
        <span class="chevron-icon">▾</span>
      </div>
      <div class="tasks-body" id="tb${li}" style="${lv.collapsed?'display:none':''}">
        <div class="tasks-inner" id="ti_${li}"></div>
        <div class="add-task-row">
          <input type="text" id="ati${li}" placeholder="${l.addtask}">
          <input type="number" class="xp-mini" id="axp${li}" value="10" min="1" max="9999">
          <button class="btn-plus" data-at="${li}">+</button>
        </div>
      </div>
    `;
    wrap.appendChild(card);

    const ti=document.getElementById('ti_'+li);
    if(!tasks.length){
      ti.innerHTML='<div style="padding:10px 12px;font-size:13px;color:var(--text3)">'+l.empty+'</div>';
    } else {
      tasks.forEach(tk=>{
        const oi=lv.tasks.indexOf(tk);
        const row=document.createElement('div');
        row.className='task-row';
        row.innerHTML=`
          <div class="chk${tk.done?' done':''}" data-chk="${li}_${oi}"></div>
          <span class="t-name${tk.done?' done':''}">${tName(tk)}</span>
          <span class="t-xp">+${tk.xp} XP</span>
          <button class="t-del" data-tdel="${li}_${oi}">✕</button>
        `;
        ti.appendChild(row);
      });
    }

    const atiEl=document.getElementById('ati'+li);
    atiEl.addEventListener('keydown',e=>{ if(e.key==='Enter') doAddTask(li); });
  });
}

function doAddTask(li){
  const ai=document.getElementById('ati'+li);
  const axp=document.getElementById('axp'+li);
  const name=ai.value.trim();
  if(!name) return;
  const xp=Math.max(1,parseInt(axp.value)||10);
  data.levels[li].tasks.push({name,xp,done:false});
  save(); render(); toast(L().toast_task);
}

/* --- EVENTS --- */
document.getElementById('levelsWrap').addEventListener('click',e=>{
  const head=e.target.closest('.level-head');
  const chk=e.target.closest('[data-chk]');
  const dellv=e.target.closest('[data-dellv]');
  const tdel=e.target.closest('[data-tdel]');
  const at=e.target.closest('[data-at]');

  if(tdel){
    const[li,ti]=tdel.dataset.tdel.split('_').map(Number);
    data.levels[li].tasks.splice(ti,1);
    save(); render(); return;
  }
  if(dellv){
    const li=+dellv.dataset.dellv;
    if(confirm(L().confirm_del+' «'+lvName(data.levels[li])+'»?')){
      data.levels.splice(li,1); save(); render(); updateHero();
    }
    return;
  }
  if(chk){
    const[li,ti]=chk.dataset.chk.split('_').map(Number);
    data.levels[li].tasks[ti].done=!data.levels[li].tasks[ti].done;
    const rect=e.target.getBoundingClientRect();
    if(data.levels[li].tasks[ti].done){
      burstEffect(rect.left+12,rect.top+12);
      xpPop(rect.left,rect.top-10,data.levels[li].tasks[ti].xp);
    }
    save(); render(); return;
  }
  if(at){ doAddTask(+at.dataset.at); return; }
  if(head&&!dellv){
    const li=+head.dataset.li;
    data.levels[li].collapsed=!data.levels[li].collapsed;
    save(); render();
  }
});

/* --- ADD LEVEL --- */
let curEmoji='🎯';
const colorRowEl=document.getElementById('colorRow');
PALETTES.forEach((p,i)=>{
  const d=document.createElement('div');
  d.className='clr'+(i===curColor?' sel':'');
  d.style.background=p.fill;
  d.addEventListener('click',()=>{
    curColor=i;
    document.querySelectorAll('.clr').forEach((el,j)=>el.classList.toggle('sel',j===i));
  });
  colorRowEl.appendChild(d);
});

document.getElementById('emojiBtnF').addEventListener('click',()=>{
  curEmoji=EMOJIS[emojiIdx%EMOJIS.length];
  emojiIdx++;
  document.getElementById('emojiBtnF').textContent=curEmoji;
});

document.getElementById('btnNew').addEventListener('click',()=>{
  document.getElementById('addForm').classList.toggle('open');
  if(document.getElementById('addForm').classList.contains('open'))
    document.getElementById('lvlNameIn').focus();
});

document.getElementById('btnCancel').addEventListener('click',()=>{
  document.getElementById('addForm').classList.remove('open');
  document.getElementById('lvlNameIn').value='';
});

document.getElementById('btnSave').addEventListener('click',()=>{
  const raw=document.getElementById('lvlNameIn').value.trim();
  if(!raw) return;
  data.levels.push({name:raw,emoji:curEmoji,ci:curColor,collapsed:false,tasks:[]});
  save(); render();
  document.getElementById('addForm').classList.remove('open');
  document.getElementById('lvlNameIn').value='';
  toast(L().toast_lv);
});

document.getElementById('lvlNameIn').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('btnSave').click();
});

/* --- SEARCH & FILTER --- */
document.getElementById('search').addEventListener('input',render);
document.getElementById('flt').addEventListener('change',render);

/* --- LANGUAGE --- */
const langWrap=document.getElementById('langWrap');
['UA','EN','PL'].forEach(lc=>{
  const b=document.createElement('button');
  b.className='pill-btn'+(lc===lang?' active':'');
  b.textContent=lc;
  b.addEventListener('click',()=>{
    lang=lc;
    document.querySelectorAll('.lang-wrap .pill-btn').forEach(el=>el.classList.remove('active'));
    b.classList.add('active');
    render();
  });
  langWrap.appendChild(b);
});

/* --- THEME --- */
document.getElementById('themeBtn').addEventListener('click',()=>{
  theme=theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme==='light'?'light':'');
  curEl.style.mixBlendMode=theme==='dark'?'screen':'multiply';
  render();
});

render();
</script>
</body>
</html>
